version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Manila
    open-pull-requests-limit: 5
    groups:
      next-ecosystem:
        patterns:
          - "next"
          - "react"
          - "react-dom"
          - "@types/react*"
      supabase:
        patterns:
          - "@supabase/*"
      drizzle:
        patterns:
          - "drizzle-*"
    ignore:
      # Pin major versions manually
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
